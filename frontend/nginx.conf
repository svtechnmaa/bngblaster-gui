server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve backend container IP via Docker's embedded DNS so backend
    # rebuilds (which receive a new IP) don't require an Nginx reload.
    resolver 127.0.0.11 valid=10s;

    # Proxy API + docs to the backend container
    location /api/ {
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /docs {
        set $backend "http://backend:8000";
        proxy_pass $backend;
    }
    location /openapi.json {
        set $backend "http://backend:8000";
        proxy_pass $backend;
    }

    # Content-hashed build assets: serve the exact file or fail cleanly with 404.
    # Never SPA-fallback these to index.html — that returns text/html for a .js
    # request and triggers "Expected a JavaScript module but got text/html".
    # Safe to cache forever because the filename changes when the content changes.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Never cache the HTML entry point, so a client always fetches an index.html
    # that references the currently-deployed asset hashes (prevents stale-index
    # mismatches after a redeploy / rolling update).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback (routes only — assets handled above)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
