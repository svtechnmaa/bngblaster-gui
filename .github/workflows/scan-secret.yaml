  trivy-scan:
    name: Trivy scan
    runs-on: ubuntu-dind
    # needs: check-trailer

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Checkout Private Action Repo
        uses: actions/checkout@v5
        with:
          repository: 'svtechnmaa/.github'
          token: ${{ secrets.GH_TOKEN }}
          ref: 'feat/workflow_template'
          path: 'private-actions' 

      - name: Check Dockerfile exists
        id: check_dockerfile
        run: |
          DOCKERFILES=$(find . -name "Dockerfile" -not -path "*/.git/*")
          if [ -n "$DOCKERFILES" ]; then
            echo "has_dockerfile=true" >> $GITHUB_OUTPUT
            echo "dockerfile_paths<<EOF" >> $GITHUB_OUTPUT
            echo "$DOCKERFILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_dockerfile=false" >> $GITHUB_OUTPUT
          fi

      # Need to build image before scan, then pass image-ref to composite action.
      - name: Build images
        if: steps.check_dockerfile.outputs.has_dockerfile == 'true'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          while IFS= read -r dockerfile; do
            context=$(dirname "$dockerfile")
            
            if [ "$context" = "." ]; then
              tag="${REPO_NAME}:${{ github.sha }}"
            else
              label=$(echo "$context" | sed 's|^\./||' | tr '/' '-')
              tag="${REPO_NAME}-${label}:${{ github.sha }}"
            fi
            
            echo "[INFO] Building $dockerfile → $tag"
            docker build -t "$tag" -f "$dockerfile" "$context"
          done <<< "${{ steps.check_dockerfile.outputs.dockerfile_paths }}"

      - name: Run Trivy Security Scan
        uses: ./private-actions/actions/trivy-scan
        with:
          # ── Required ────────────────────────────────────────────────────
          trivy-server:      ${{ secrets.TRIVY_SERVER }}
          mail-username:     ${{ vars.MAIL_USERNAME }}
          mail-password:     ${{ secrets.MAIL_PASSWORD }}
          it-team-email:     ${{ vars.IT_TEAM_EMAIL }}
          extra-recipients:  ${{ vars.DEFAULT_MAIL_RECIPIENTS }}

          # ── Image scan (bỏ comment nếu repo có Dockerfile) ──────────────
          enable-image-scan: "true"
          image-ref:         myapp:${{ github.sha }}

          # ── Optional (bỏ qua nếu muốn dùng default) ─────────────────────
          # severity:          CRITICAL,HIGH
          # scanners:          secret,misconfig,vuln
          # retention-days:    "30"
