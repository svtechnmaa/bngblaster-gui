        docker push ghcr.io/${{ env.REPO }}/${FRONTEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
        docker push ghcr.io/${{ env.REPO }}/${FRONTEND_IMAGE_NAME}:latest

