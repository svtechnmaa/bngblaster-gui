name: Build and Test bngblaster-gui app

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_id:
        description: 'Full commit ID to build (default: latest commit). e.g daae94a0f72a13f7092812fa42d684b2af827xxx. WARNING: release job will NOT run by this trigger'
        type: string
      run_test:
        description: 'Run test'
        default: true
        type: boolean
      keep_image: 
        description: 'Keep image in GHCR even test fails'
        type: boolean
        default: false

env:
  IMAGE_TEST_TAG: ${{ format('test-v{0}', github.run_number) }}
  COMMIT_FULL_ID: ${{ inputs.commit_id || github.sha }}

jobs:
  build:
    runs-on: ubuntu-dind
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      check_no_ci: ${{ steps.check_commit_message.outputs.no_ci }}
      check_no_scan: ${{ steps.check_commit_message.outputs.no_scan }}
      check_no_cache: ${{ steps.check_commit_message.outputs.no_cache }}
      is_latest_or_release_image: ${{ steps.check_existing_image.outputs.is_latest_or_release_image }}
    steps:
      
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        ref: ${{ env.COMMIT_FULL_ID }}

    - name: Downcase REPO and shorten COMMIT ID
      run: |
        COMMIT_SHORT_ID=$(git rev-parse --short ${{ env.COMMIT_FULL_ID }})
        echo "COMMIT_SHORT_ID=${COMMIT_SHORT_ID}" >>${GITHUB_ENV}
        echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
        echo "COMMIT_SHORT_ID=${{ env.COMMIT_SHORT_ID }}"
        echo "REPO=${{ env.REPO }}"

    ## Check commit message for no-ci, no-scan, no-cache
    - name: Check commit message
      id: check_commit_message
      run: |
        commit_message=$(git log --pretty=format:"%H %s %b" | grep "${{ env.COMMIT_FULL_ID }}" | sed 's,'${{ env.COMMIT_FULL_ID }}' ,,g')

        if [[ "$commit_message" =~ .*"no-ci".* ]]; then
            echo "❌ Found 'no-ci' in commit message. Stopping workflow!"
            echo "no_ci=true" >> $GITHUB_OUTPUT

        elif [[ "$commit_message" =~ .*"no-scan".* ]]; then
            echo "🛑 Found 'no_scan' in commit message. Skipping image and Dockerfile scan!"
            echo "no_scan=true" >> $GITHUB_OUTPUT
            
        elif [[ "$commit_message" =~ .*"no-cache".* ]]; then
            echo "⚡ Found 'no_cache' in commit message. Skipping caching during image build!"
            echo "no_cache=true" >> $GITHUB_OUTPUT
        fi

    ## Check existing image in GHCR to skip building if image with commit ID tag is existed
    - name: Check existing image in GHCR
      id: check_existing_image
      run: |
        IS_IMAGE_TAG_BY_COMMIT_ID_EXISTED=true
        IS_LATEST_OR_RELEASE_IMAGE=false

        for IMAGE_NAME in bngblaster-gui-backend bngblaster-gui-frontend; do
          PACKAGE_NAME="${IMAGE_NAME}"
          RESPONSE=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions")

          if echo "$RESPONSE" | jq -e 'has("message") and .status == "404"' >/dev/null; then
            echo "Package '$REPO_NAME/$IMAGE_NAME' not found"
            IS_IMAGE_TAG_BY_COMMIT_ID_EXISTED=false
            continue
          fi

          IMAGES=$(echo "$RESPONSE" | jq -r ' .[] | {tags: .metadata.container.tags, updated_at: .updated_at, id: .id} ')

          EXISTED_IMAGE=$(echo $IMAGES | jq -c 'select(.tags | contains(["${{ env.COMMIT_SHORT_ID }}"]))')

          if [[ -z $EXISTED_IMAGE ]]; then
            echo "Image $IMAGE_NAME with tag ${{ env.COMMIT_SHORT_ID }} is not in GHCR yet."
            IS_IMAGE_TAG_BY_COMMIT_ID_EXISTED=false
          else
            FULL_TAGS=$(echo $EXISTED_IMAGE | jq -c '.tags')
            if [[ $FULL_TAGS == *"latest"* || $FULL_TAGS =~ v[0-9]+\.[0-9]+\.[0-9]+ ]]; then    
              IS_LATEST_OR_RELEASE_IMAGE=true
            else
              echo "$IMAGE_NAME is not latest or release image"
            fi

            echo "Image $IMAGE_NAME with tag ${{ env.COMMIT_SHORT_ID }} exists. The full tags are $FULL_TAGS."
          fi
        done

        echo "is_latest_or_release_image=$IS_LATEST_OR_RELEASE_IMAGE" >> $GITHUB_OUTPUT
        echo "is_latest_or_release_image=$IS_LATEST_OR_RELEASE_IMAGE"
        echo "is_image_tag_by_commit_id_existed=$IS_IMAGE_TAG_BY_COMMIT_ID_EXISTED" >> $GITHUB_OUTPUT
        echo "is_image_tag_by_commit_id_existed=$IS_IMAGE_TAG_BY_COMMIT_ID_EXISTED"
    - name: Get Job ID
      if: steps.check_commit_message.outputs.no_ci != 'true'
      id: get_job_id
      run: |
        job_id=$(curl -s -H "Authorization: Bearer ${{ secrets.PUSH_TOKEN }}" \
        "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
        | jq --arg job "${{ github.job }}" '.jobs[] | select(.name==$job) | .id')

        echo "job_id=$job_id" >> $GITHUB_OUTPUT

    - name: Get Commit ID and Committer Info
      run: |
        COMMIT_ID=${{ env.COMMIT_FULL_ID }}

        # Get committer info
        echo "Getting committer info for commit ID: $COMMIT_ID"
        COMMITTER_EMAIL=$(git show -s --format='%ce' $COMMIT_ID)
        COMMITTER_NAME=$(git show -s --format='%cn' $COMMIT_ID)

        # Get author info if committer email is noreply
        if [[ "$COMMITTER_EMAIL" == *noreply* ]]; then 
          echo "Committer email is noreply, getting author info..."
          COMMITTER_NAME=$(git show -s --format='%an' $COMMIT_ID)
          COMMITTER_EMAIL=$(git show -s --format='%ae' $COMMIT_ID)
        fi

        # Fallback to github event info if still noreply
        if [[ "$COMMITTER_EMAIL" == *noreply* ]]; then 
          echo "Committer email is still noreply, using github event info..."
          COMMITTER_NAME=${{ github.event.pusher.name || github.event.sender.login }}
          COMMITTER_EMAIL=${{ github.event.pusher.email}}
        fi

        echo "COMMIT_ID=${COMMIT_ID}" >> $GITHUB_ENV
        echo "COMMITTER_NAME=${COMMITTER_NAME}" >> $GITHUB_ENV
        echo "COMMITTER_EMAIL=${COMMITTER_EMAIL}" >> $GITHUB_ENV
        echo "COMMIT_ID: $COMMIT_ID"
        echo "COMMITTER_NAME: $COMMITTER_NAME"
        echo "COMMITTER_EMAIL: $COMMITTER_EMAIL"

    - name: Login to Docker Container Registry
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') &&
        (steps.check_commit_message.outputs.no_ci != 'true')
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: '${{ secrets.DOCKER_HUB_USERNAME }}'
        password: '${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}'

    - name: Login to GitHub Container Registry
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: '${{ github.repository_owner }}'
        password: '${{ secrets.GITHUB_TOKEN }}'
    - name: Build services with Docker Compose
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      run: |
        docker compose -f docker-compose.yml up -d
    - name: Wait for services to be healthy
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      run: |
        fail_with_logs() {
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --no-color --tail=200
          exit 1
        }

        EXITED_CONTAINERS=$(docker compose -f docker-compose.yml ps --all --format json | jq -r 'select(.State == "exited" or .State == "dead") | .Name')
        if [[ -n "$EXITED_CONTAINERS" ]]; then
          echo "Containers failed to stay running:"
          echo "$EXITED_CONTAINERS"
          fail_with_logs
        fi

        wait_for() {
          local name=$1
          local url=$2
          local max_attempts=15
          local interval=10

          echo "⏳ Waiting for $name at $url..."
          for i in $(seq 1 $max_attempts); do
            if curl -fsS "$url" > /dev/null 2>&1; then
              echo "✅ $name is healthy"
              return 0
            fi
            echo "  attempt $i/$max_attempts — retrying in ${interval}s..."
            sleep $interval
          done

          echo "❌ $name did not become healthy after $((max_attempts * interval))s"
          fail_with_logs
        }

        wait_for "backend"  "http://localhost:8001/health"
        wait_for "frontend" "http://localhost:3001"
        EXITED_CONTAINERS=$(docker compose -f docker-compose.yml ps --all --format json | jq -r 'select(.State == "exited" or .State == "dead") | .Name')
        if [[ -n "$EXITED_CONTAINERS" ]]; then
          echo "Containers failed after health checks:"
          echo "$EXITED_CONTAINERS"
          fail_with_logs
        fi

    - name: Tag and push Backend image to GitHub Container Registry
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      run: |
        BACKEND_IMAGE_NAME="bngblaster-gui-backend"
        docker tag backend:latest ghcr.io/svtechnmaa/${BACKEND_IMAGE_NAME}:${{ env.IMAGE_TEST_TAG }}
        docker tag backend:latest ghcr.io/svtechnmaa/${BACKEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
        docker push ghcr.io/svtechnmaa/${BACKEND_IMAGE_NAME}:${{ env.IMAGE_TEST_TAG }}
        docker push ghcr.io/svtechnmaa/${BACKEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
    - name: Tag and push Frontend image to GitHub Container Registry
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      run: |
        FRONTEND_IMAGE_NAME="bngblaster-gui-frontend"
        docker tag frontend:latest ghcr.io/svtechnmaa/${FRONTEND_IMAGE_NAME}:${{ env.IMAGE_TEST_TAG }}
        docker tag frontend:latest ghcr.io/svtechnmaa/${FRONTEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
        docker push ghcr.io/svtechnmaa/${FRONTEND_IMAGE_NAME}:${{ env.IMAGE_TEST_TAG }}
        docker push ghcr.io/svtechnmaa/${FRONTEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}

