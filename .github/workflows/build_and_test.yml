    - name: Wait for services to be healthy
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      run: |
        timeout 150 bash -c 'until curl -f http://localhost:8001/health > /dev/null 2>&1; do echo "Waiting for backend..."; sleep 2; done'
        echo "✅ Services are healthy"
        
    - name: Tag and push Backend image to GitHub Container Registry
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      run: |
        BACKEND_IMAGE_NAME="bngblaster-gui-backend"
        docker tag ${BACKEND_IMAGE_NAME}:latest ghcr.io/${{ env.REPO }}/${BACKEND_IMAGE_NAME}:${{ env.IMAGE_TEST_TAG }}
        docker tag ${BACKEND_IMAGE_NAME}:latest ghcr.io/${{ env.REPO }}/${BACKEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
        docker tag ${BACKEND_IMAGE_NAME}:latest ghcr.io/${{ env.REPO }}/${BACKEND_IMAGE_NAME}:latest
        docker push ghcr.io/${{ env.REPO }}/${BACKEND_IMAGE_NAME}:${{ env.IMAGE_TEST_TAG }}
        docker push ghcr.io/${{ env.REPO }}/${BACKEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
        docker push ghcr.io/${{ env.REPO }}/${BACKEND_IMAGE_NAME}:latest

    - name: Tag and push Frontend image to GitHub Container Registry
      if: |
        (github.event_name == 'push' || github.event_name == 'pull_request' || 
        steps.check_existing_image.outputs.is_image_tag_by_commit_id_existed == 'false') && 
        steps.check_commit_message.outputs.no_ci != 'true'
      run: |
        FRONTEND_IMAGE_NAME="bngblaster-gui-frontend"
        docker tag ${FRONTEND_IMAGE_NAME}:latest ghcr.io/${{ env.REPO }}/${FRONTEND_IMAGE_NAME}:${{ env.IMAGE_TEST_TAG }}
        docker tag ${FRONTEND_IMAGE_NAME}:latest ghcr.io/${{ env.REPO }}/${FRONTEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
        docker tag ${FRONTEND_IMAGE_NAME}:latest ghcr.io/${{ env.REPO }}/${FRONTEND_IMAGE_NAME}:latest
