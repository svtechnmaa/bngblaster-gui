  release:
    if: (github.event_name == 'push' || github.event_name == 'pull_request') && needs.build.outputs.check_no_ci != 'true'
    needs:
      - build
    runs-on: ubuntu-dind
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    - name: Semantic Release
      uses: cycjimmy/semantic-release-action@v4
      id: semantic
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # If permission denied for protected branch, use ${{ secrets.PUSH_TOKEN }} instead.
    - name: No release published
      if: ${{ steps.semantic.outputs.new_release_published == 'false' }}
      run: |
        echo "No release published, skipping the rest of the job..."
    - name: Downcase REPO and shorten COMMIT ID
      if: steps.semantic.outputs.new_release_published == 'true'
      run: |
          COMMIT_SHORT_ID=$(git rev-parse --short ${{ env.COMMIT_FULL_ID }})
          echo "COMMIT_SHORT_ID=${COMMIT_SHORT_ID}" >>${GITHUB_ENV}
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
          echo "COMMIT_SHORT_ID=${{ env.COMMIT_SHORT_ID }}"
          echo "REPO=${{ env.REPO }}"

    - name: Login to GitHub Container Registry
      if: steps.semantic.outputs.new_release_published == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: '${{ github.repository_owner }}'
        password: '${{ secrets.GITHUB_TOKEN }}'

    - name: Pull image from GitHub Container Registry
      if: steps.semantic.outputs.new_release_published == 'true'
      run: |
        BACKEND_IMAGE_NAME="bngblaster-gui-backend"
        FRONTEND_IMAGE_NAME="bngblaster-gui-frontend"
        docker pull ghcr.io/svtechnmaa/${FRONTEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
        docker pull ghcr.io/svtechnmaa/${BACKEND_IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}

    - name: Delete package from GHCR after successful release
      if: steps.semantic.outputs.new_release_published == 'true'
      run: |
        if [[ "${{ needs.build.outputs.is_latest_or_release_image }}" == "true" ]]; then
          echo "Image with tag ${{ env.COMMIT_SHORT_ID }} must NOT be deleted as it is release or latest image."
        else
          echo "New release ${{ env.RELEASE_IMAGE_TAG }} was published, deleting images with tag ${{ env.COMMIT_SHORT_ID }} from GHCR..."
          for IMAGE_NAME in bngblaster-gui-backend bngblaster-gui-frontend; do
            echo "Processing $IMAGE_NAME..."
            PACKAGE_NAME="${IMAGE_NAME}"
            VERSION_ID=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions" \
              | jq -r '.[] | select(.metadata.container.tags[] == "${{ env.COMMIT_SHORT_ID }}") | .id')
            echo "Package version ID for $IMAGE_NAME: $VERSION_ID"
            curl -i -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$VERSION_ID"
          done
        fi
      env:
        RELEASE_IMAGE_TAG: v${{ steps.semantic.outputs.new_release_version }}
    - name: Push latest released image to GitHub Container Registry
      if: steps.semantic.outputs.new_release_published == 'true'
      run: |
        for IMAGE_NAME in bngblaster-gui-backend bngblaster-gui-frontend; do
          echo "Tagging and pushing $IMAGE_NAME..."
          docker tag ghcr.io/svtechnmaa/${IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }} ghcr.io/svtechnmaa/${IMAGE_NAME}:${{ env.RELEASE_IMAGE_TAG }}
          docker tag ghcr.io/svtechnmaa/${IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }} ghcr.io/svtechnmaa/${IMAGE_NAME}:latest

          docker push ghcr.io/svtechnmaa/${IMAGE_NAME}:${{ env.COMMIT_SHORT_ID }}
          docker push ghcr.io/svtechnmaa/${IMAGE_NAME}:${{ env.RELEASE_IMAGE_TAG }}
          docker push ghcr.io/svtechnmaa/${IMAGE_NAME}:latest
        done
      env:
        RELEASE_IMAGE_TAG: v${{ steps.semantic.outputs.new_release_version }}

