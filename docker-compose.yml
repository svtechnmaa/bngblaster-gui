services:
  postgres:
    image: postgres:16-alpine
    container_name: bngweb-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bng_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bng_pass}
      POSTGRES_DB: ${POSTGRES_DB:-bng_web}
    volumes:
      - bngweb_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bng_user}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    image: backend:latest
    build: ./backend
    container_name: bngweb-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bng_user}:${POSTGRES_PASSWORD:-bng_pass}@postgres:5432/${POSTGRES_DB:-bng_web}
      SECRET_KEY: ${SECRET_KEY}
      FERNET_KEY: ${FERNET_KEY:-}
      BNGBLASTER_BACKEND_URL: ${BNGBLASTER_BACKEND_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      # SSO — leave blank to disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8001/api/v1/auth/google/callback}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:-http://localhost:8001/api/v1/auth/keycloak/callback}
    ports:
      - "8001:8000"
    restart: unless-stopped

  frontend:
    image: frontend:latest
    build: ./frontend
    container_name: bngweb-frontend
    depends_on:
      - backend
    ports:
      - "3001:80"
    restart: unless-stopped

volumes:
  bngweb_pgdata:
